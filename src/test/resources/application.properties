spring.application.name=movies-test
server.port=0

spring.datasource.url=${TEST_DB_URL:jdbc:mysql://localhost:3306/moviesdb_test?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Argentina/Buenos_Aires}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${TEST_DB_USERNAME:root}
spring.datasource.password=${TEST_DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
