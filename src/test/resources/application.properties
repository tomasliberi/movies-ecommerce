spring.application.name=movies-test
server.port=0

spring.datasource.url=jdbc:h2:mem:moviesdb_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

app.jwt.secret=${TEST_JWT_SECRET:1234567890123456789012345678901234567890123456789012345678901234}
app.jwt.expiration-ms=${TEST_JWT_EXPIRATION_MS:3600000}
