spring.application.name=movies
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/moviesdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Argentina/Buenos_Aires}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234567}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

app.jwt.secret=${JWT_SECRET:1234567890123456789012345678901234567890123456789012345678901234}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
