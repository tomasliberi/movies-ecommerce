<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #1f2937; }
      .entity-title { font: 700 20px Arial, sans-serif; fill: #ffffff; }
      .field { font: 16px Arial, sans-serif; fill: #111827; }
      .relation { font: 700 14px Arial, sans-serif; fill: #374151; }
      .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 2; rx: 12; ry: 12; }
      .header-blue { fill: #2563eb; }
      .header-green { fill: #059669; }
      .header-red { fill: #dc2626; }
      .header-orange { fill: #ea580c; }
      .header-purple { fill: #7c3aed; }
      .line { stroke: #334155; stroke-width: 3; fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
  </defs>

  <text x="520" y="40" class="title">Diagrama Entidad-Relacion - Ecommerce de Peliculas</text>

  <rect x="60" y="120" width="280" height="180" class="box" />
  <rect x="60" y="120" width="280" height="42" class="header-blue" rx="12" ry="12" />
  <text x="160" y="148" class="entity-title">USUARIO</text>
  <text x="80" y="190" class="field">PK id_usuario</text>
  <text x="80" y="215" class="field">nombre</text>
  <text x="80" y="240" class="field">apellido</text>
  <text x="80" y="265" class="field">email</text>
  <text x="80" y="290" class="field">password</text>

  <rect x="430" y="120" width="260" height="110" class="box" />
  <rect x="430" y="120" width="260" height="42" class="header-green" rx="12" ry="12" />
  <text x="510" y="148" class="entity-title">CARRITO</text>
  <text x="450" y="190" class="field">PK id_carrito</text>
  <text x="450" y="215" class="field">FK id_usuario</text>

  <rect x="800" y="90" width="310" height="160" class="box" />
  <rect x="800" y="90" width="310" height="42" class="header-orange" rx="12" ry="12" />
  <text x="875" y="118" class="entity-title">ITEM_CARRITO</text>
  <text x="820" y="160" class="field">PK id_item_carrito</text>
  <text x="820" y="185" class="field">FK id_carrito</text>
  <text x="820" y="210" class="field">FK id_producto</text>
  <text x="820" y="235" class="field">cantidad</text>

  <rect x="60" y="430" width="280" height="160" class="box" />
  <rect x="60" y="430" width="280" height="42" class="header-red" rx="12" ry="12" />
  <text x="175" y="458" class="entity-title">ORDEN</text>
  <text x="80" y="500" class="field">PK id_orden</text>
  <text x="80" y="525" class="field">FK id_usuario</text>
  <text x="80" y="550" class="field">fecha</text>
  <text x="80" y="575" class="field">total / estado</text>

  <rect x="430" y="420" width="300" height="185" class="box" />
  <rect x="430" y="420" width="300" height="42" class="header-purple" rx="12" ry="12" />
  <text x="495" y="448" class="entity-title">DETALLE_ORDEN</text>
  <text x="450" y="490" class="field">PK id_detalle</text>
  <text x="450" y="515" class="field">FK id_orden</text>
  <text x="450" y="540" class="field">FK id_producto</text>
  <text x="450" y="565" class="field">cantidad</text>
  <text x="450" y="590" class="field">precio_unitario</text>

  <rect x="1110" y="430" width="290" height="160" class="box" />
  <rect x="1110" y="430" width="290" height="42" class="header-green" rx="12" ry="12" />
  <text x="1195" y="458" class="entity-title">CATEGORIA</text>
  <text x="1130" y="500" class="field">PK id_categoria</text>
  <text x="1130" y="525" class="field">nombre</text>
  <text x="1130" y="550" class="field">descripcion</text>

  <rect x="1080" y="120" width="320" height="200" class="box" />
  <rect x="1080" y="120" width="320" height="42" class="header-blue" rx="12" ry="12" />
  <text x="1185" y="148" class="entity-title">PRODUCTO</text>
  <text x="1100" y="190" class="field">PK id_producto</text>
  <text x="1100" y="215" class="field">nombre</text>
  <text x="1100" y="240" class="field">descripcion</text>
  <text x="1100" y="265" class="field">precio</text>
  <text x="1100" y="290" class="field">stock</text>
  <text x="1100" y="315" class="field">FK id_categoria</text>

  <path d="M340 175 L430 175" class="line" marker-end="url(#arrow)" />
  <text x="362" y="165" class="relation">1 a 1</text>
  <text x="355" y="195" class="relation">tiene</text>

  <path d="M690 175 L800 175" class="line" marker-end="url(#arrow)" />
  <text x="720" y="165" class="relation">1 a N</text>
  <text x="710" y="195" class="relation">contiene</text>

  <path d="M1110 210 L980 210" class="line" marker-end="url(#arrow)" />
  <text x="1000" y="200" class="relation">1 a N</text>
  <text x="995" y="230" class="relation">referencia</text>

  <path d="M250 300 L250 430" class="line" marker-end="url(#arrow)" />
  <text x="260" y="360" class="relation">1 a N</text>
  <text x="260" y="385" class="relation">realiza</text>

  <path d="M340 510 L430 510" class="line" marker-end="url(#arrow)" />
  <text x="365" y="500" class="relation">1 a N</text>
  <text x="360" y="530" class="relation">incluye</text>

  <path d="M1080 250 L880 420" class="line" marker-end="url(#arrow)" />
  <text x="930" y="305" class="relation">1 a N</text>
  <text x="930" y="330" class="relation">vendido en</text>

  <path d="M1255 430 L1240 320" class="line" marker-end="url(#arrow)" />
  <text x="1270" y="360" class="relation">1 a N</text>
  <text x="1270" y="385" class="relation">clasifica</text>

  <text x="70" y="690" class="field">Modelo futuro del sistema:</text>
  <text x="70" y="720" class="field">Un usuario tiene un carrito y puede generar muchas ordenes.</text>
  <text x="70" y="745" class="field">Cada carrito contiene items asociados a productos, y cada orden guarda su detalle de compra.</text>
  <text x="70" y="770" class="field">Los productos representan peliculas en venta y pertenecen a una categoria.</text>
</svg>
